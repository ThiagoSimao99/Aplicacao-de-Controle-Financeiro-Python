{% extends 'base.html' %}

{% block title %}Salvar Categoria{% endblock %}

{% block content %}
<div class="row justify-content-center animate-in">
    <div class="col-md-7 col-lg-5">
        <div class="card">
            <div class="card-header">
                <i class="fas fa-tag me-2" style="color: var(--accent-primary);"></i>Salvar Categoria
            </div>
            <div class="card-body p-4">
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <div class="d-grid gap-2 mt-3">
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-check me-2"></i>Salvar
                        </button>
                        <a href="{% url 'categoria-list' %}" class="btn btn-secondary">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
